<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Minha Princesa ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top, #ff4d6d, #0a0a0a);
      overflow-x: hidden;
    }.fade-in {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}

.heart {
  position: fixed;
  color: #ff4d6d;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

  </style>
</head>
<body class="text-white">  <!-- HERO -->  <section class="h-screen flex flex-col items-center justify-center text-center px-4">
    <h1 class="text-4xl md:text-6xl font-bold mb-4">Para minha princesa</h1>
    <p class="opacity-70 mb-6">Juntos desde 12 de setembro de 2021</p><div class="flex gap-4">
  <div class="bg-white/10 p-4 rounded-2xl backdrop-blur text-center">
    <h2 class="text-2xl font-bold">4</h2>
    <p class="text-sm">Anos</p>
  </div>
  <div class="bg-white/10 p-4 rounded-2xl backdrop-blur text-center">
    <h2 class="text-2xl font-bold">3</h2>
    <p class="text-sm">Meses</p>
  </div>
  <div class="bg-white/10 p-4 rounded-2xl backdrop-blur text-center">
    <h2 class="text-2xl font-bold">25</h2>
    <p class="text-sm">Dias</p>
  </div>
</div>

  </section>  <!-- GALERIA -->  <section class="py-20 px-6 fade-in">
    <h2 class="text-3xl text-center mb-10">Nossos Momentos 📸</h2>
    <div class="grid md:grid-cols-3 gap-6">
      <img src="foto1.jpg" class="rounded-2xl hover:scale-105 transition">
      <img src="foto2.jpg" class="rounded-2xl hover:scale-105 transition">
      <img src="foto3.jpg" class="rounded-2xl hover:scale-105 transition">
    </div>
  </section>  <!-- TEXTO -->  <section class="py-20 px-6 text-center fade-in">
    <h2 class="text-3xl mb-6">Uma mensagem 💌</h2>
    <p class="max-w-xl mx-auto opacity-80">
      Desde que você entrou na minha vida, tudo ficou mais bonito.
      Cada momento ao seu lado é especial, e eu faria tudo de novo mil vezes só pra viver isso com você.
    </p>
  </section>  <!-- MÚSICA -->  <section class="py-20 text-center fade-in">
    <h2 class="text-2xl mb-4">Nossa música 🎶</h2>
    <audio controls class="mx-auto">
      <source src="musica.mp3" type="audio/mpeg">
    </audio>
  </section>  <!-- SCRIPT ANIMAÇÃO -->  <script>
    const elements = document.querySelectorAll('.fade-in');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    });

    elements.forEach(el => observer.observe(el));

    // CORAÇÕES SUBINDO
    setInterval(() => {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = Math.random() * 100 + 'vw';
      heart.innerHTML = '❤️';
      heart.style.fontSize = (Math.random() * 20 + 10) + 'px';

      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 6000);
    }, 500);
  </script></body>
</html>
