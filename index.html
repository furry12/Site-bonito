<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História ❤️</title>  <script src="https://cdn.tailwindcss.com"></script>  <style>
    :root { --size: 260px; --depth: 320px; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #000, #1a0008);
      color: white;
      font-family: sans-serif;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
    }

    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      scroll-snap-align: start;
    }

    .title {
      font-size: 2.8rem;
      font-weight: bold;
      background: linear-gradient(90deg,#ff4d6d,#ff99ac);
      -webkit-background-clip: text;
      color: transparent;
    }

    /* CARROSSEL MELHORADO */
    .carousel {
      perspective: 1200px;
      width: var(--size);
      height: var(--size);
    }

    .carousel-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: spin 10s linear infinite;
    }

    .carousel-inner img {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(255,77,109,0.7);
      transition: 0.5s;
    }

    .carousel-inner img:hover {
      transform: translate(-50%, -50%) scale(1.1);
    }

    .img1 { transform: translate(-50%, -50%) rotateY(0deg) translateZ(var(--depth)); }
    .img2 { transform: translate(-50%, -50%) rotateY(120deg) translateZ(var(--depth)); }
    .img3 { transform: translate(-50%, -50%) rotateY(240deg) translateZ(var(--depth)); }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    /* FUNDO ESTRELAS */
    .star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: white;
      opacity: 0.8;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }

    /* BOTÃO */
    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: linear-gradient(90deg,#ff4d6d,#ff99ac);
      color: white;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px #ff4d6d;
    }

    /* TEXTO */
    .typing {
      border-right: 2px solid white;
      white-space: nowrap;
      overflow: hidden;
      max-width: 90vw;
    }

    /* CORAÇÕES */
    .heart {
      position: fixed;
      color: #ff4d6d;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }

    .modal.show { opacity: 1; pointer-events: all; }

    .modal img {
      max-width: 90%;
      border-radius: 20px;
    }
  </style></head><body>  <section>
    <h1 class="title">Para minha princesa ❤️</h1>
    <p>Um pedacinho do que sinto por você</p>
    <button class="btn" onclick="next()">Começar ✨</button>
  </section>  <section>
    <h2>Nossos Momentos 📸</h2>
    <div class="carousel">
      <div class="carousel-inner">
        <img src="foto1.jpg" class="img1" onclick="openModal(this.src)">
        <img src="foto2.jpg" class="img2" onclick="openModal(this.src)">
        <img src="foto3.jpg" class="img3" onclick="openModal(this.src)">
      </div>
    </div>
  </section>  <section>
    <h2>Uma mensagem 💌</h2>
    <p id="text" class="typing"></p>
  </section>  <section>
    <button class="btn" onclick="surpresa()">Clique aqui 💖</button>
    <p id="surpresa" style="opacity:0;">Você é tudo pra mim ❤️</p>
  </section>  <section>
    <h2>Nossa música 🎶</h2>
    <audio id="audio" controls>
      <source src="musica.mp3" type="audio/mpeg">
    </audio>
  </section>  <div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
  </div>  <script>
    function next(){ window.scrollBy({top:window.innerHeight,behavior:'smooth'}); }

    const msg = "Desde que você entrou na minha vida, tudo mudou. Você é meu melhor sorriso, meu lugar favorito e o amor da minha vida.";
    let i=0;
    function typing(){
      if(i<msg.length){
        document.getElementById('text').innerHTML += msg.charAt(i);
        i++;
        setTimeout(typing,35);
      }
    }
    typing();

    function surpresa(){
      document.getElementById('surpresa').style.opacity=1;
      document.getElementById('audio').play();
    }

    function openModal(src){
      document.getElementById('modalImg').src=src;
      document.getElementById('modal').classList.add('show');
    }

    function closeModal(){
      document.getElementById('modal').classList.remove('show');
    }

    // CORAÇÕES
    setInterval(()=>{
      const h=document.createElement('div');
      h.className='heart';
      h.style.left=Math.random()*100+'vw';
      h.innerHTML='❤️';
      h.style.fontSize=(Math.random()*20+10)+'px';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),6000);
    },400);

    // ESTRELAS
    for(let i=0;i<50;i++){
      const s=document.createElement('div');
      s.className='star';
      s.style.left=Math.random()*100+'vw';
      s.style.top=Math.random()*100+'vh';
      document.body.appendChild(s);
    }
  </script></body>
</html>
