<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #ff4d6d, #0a0a0a);
      color: white;
      font-family: sans-serif;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
    }section {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  scroll-snap-align: start;
}

/* HERO */
.title {
  font-size: 2.5rem;
  font-weight: bold;
}

/* CARROSSEL 3D */
.carousel {
  perspective: 1200px;
}

.carousel-inner {
  position: relative;
  width: 260px;
  height: 260px;
  transform-style: preserve-3d;
  transition: transform 1s;
  animation: spin 10s infinite linear;
}

.carousel-inner img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
  cursor: pointer;
}

.img1 { transform: rotateY(0deg) translateZ(300px); }
.img2 { transform: rotateY(120deg) translateZ(300px); }
.img3 { transform: rotateY(240deg) translateZ(300px); }

@keyframes spin {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(360deg); }
}

/* MODAL FOTO */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
}

.modal img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 20px;
}

.modal.show {
  opacity: 1;
  pointer-events: all;
}

/* DIGITAÇÃO */
.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
}

/* BOTÃO */
.btn {
  margin-top: 20px;
  padding: 12px 24px;
  background: white;
  color: black;
  border-radius: 20px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff4d6d;
}

/* CORAÇÕES */
.heart {
  position: fixed;
  color: #ff4d6d;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

  </style>
</head>
<body>  <!-- HERO -->  <section>
    <h1 class="title">Para minha princesa ❤️</h1>
    <p>Esse site é só um pedacinho do que sinto por você</p>
    <button class="btn" onclick="next()">Deslizar ↓</button>
  </section>  <!-- CARROSSEL -->  <section>
    <h2>Nossos Momentos 📸</h2>
    <div class="carousel">
      <div class="carousel-inner" id="carousel">
        <img src="foto1.jpg" class="img1" onclick="openModal(this.src)">
        <img src="foto2.jpg" class="img2" onclick="openModal(this.src)">
        <img src="foto3.jpg" class="img3" onclick="openModal(this.src)">
      </div>
    </div>
  </section>  <!-- CARTA -->  <section>
    <h2>Uma mensagem 💌</h2>
    <p id="text" class="typing"></p>
  </section>  <!-- SURPRESA -->  <section>
    <button class="btn" onclick="surpresa()">Clique aqui 💖</button>
    <p id="surpresa" style="opacity:0; transition:0.5s;">Eu te amo mais do que palavras conseguem dizer ❤️</p>
  </section>  <!-- MÚSICA -->  <section>
    <h2>Nossa música 🎶</h2>
    <audio id="audio" controls>
      <source src="musica.mp3" type="audio/mpeg">
    </audio>
  </section>  <!-- MODAL -->  <div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
  </div>  <script>
    function next(){ window.scrollBy(0, window.innerHeight); }

    // DIGITAÇÃO
    const msg = "Desde que você entrou na minha vida, tudo ficou mais bonito. Você é meu melhor sorriso, meu lugar favorito e o amor da minha vida.";
    let i = 0;
    function typing(){
      if(i < msg.length){
        document.getElementById('text').innerHTML += msg.charAt(i);
        i++;
        setTimeout(typing,40);
      }
    }
    typing();

    // SURPRESA
    function surpresa(){
      document.getElementById('surpresa').style.opacity = 1;
      document.getElementById('audio').play();
    }

    // MODAL
    function openModal(src){
      const modal = document.getElementById('modal');
      document.getElementById('modalImg').src = src;
      modal.classList.add('show');
    }

    function closeModal(){
      document.getElementById('modal').classList.remove('show');
    }

    // CORAÇÕES
    setInterval(()=>{
      const h = document.createElement('div');
      h.className = 'heart';
      h.style.left = Math.random()*100+'vw';
      h.innerHTML = '❤️';
      h.style.fontSize = (Math.random()*20+10)+'px';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),6000);
    },400);
  </script></body>
</html>
